<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댓글 넛지 커뮤니티</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #12d3cf;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text-main: #333;
            --text-sub: #888;
            --border: #eeeeee;
            --safe: #28a745;
            --offensive: #ff9900;
            --danger: #ff5a5a;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); }

        /* 헤더 */
        .header {
            height: 60px; background: var(--white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .header-logo { color: var(--primary); font-weight: 800; display: flex; align-items: center; cursor: pointer; text-decoration: none; }
        .header-logo span { color: #333; margin-left: 8px; letter-spacing: -0.5px; }
        .search-bar { 
            background: #f1f3f5; 
            border-radius: 22px; 
            padding: 10px 20px; 
            width: 360px; 
            display: flex; 
            align-items: center; 
            border: 1px solid var(--border);
            box-sizing: border-box;
        }
        .search-bar input { border: none; background: transparent; outline: none; width: 100%; margin-left: 10px; font-size: 14px; }
        .header-icons { display: flex; gap: 22px; color: #555; font-size: 18px; align-items: center; }
        .header-icon-link { color: inherit; text-decoration: none; transition: color 0.2s; }
        .header-icon-link:hover { color: var(--primary); }

        .wrapper { display: flex; padding-top: 60px; }

        /* 좌측 사이드바 */
        .left-sidebar {
            width: 70px; height: calc(100vh - 60px); background: var(--white);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            align-items: center; padding-top: 20px; position: fixed;
        }
        .nav-icon {
            width: 42px; height: 42px; border-radius: 50%; background: #eee; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer;
        }
        .nav-icon.active { background: var(--primary); color: white; }

        /* 메인 영역 레이아웃 */
        .main-container { margin-left: 70px; flex: 1; display: flex; flex-direction: column; align-items: center; padding: 18px 20px; }
        .main-content-wrap { width: 985px; max-width: 100%; display: flex; flex-direction: column; }
        .main-inner { display: flex; justify-content: center; gap: 25px; margin-top: 44px; }
        .content-area { width: 680px; }

        /* 아티스트 헤더 */
        .artist-page-header {
            width: 100%; box-sizing: border-box; height: 64px; background: var(--white); 
            border: 1px solid var(--border); border-radius: 15px; margin-bottom: 20px; 
            display: flex; align-items: flex-end; gap: 20px; padding: 0 24px;
        }
        .artist-page-header .artist-avatar-wrap {
            width: 80px; height: 80px; border-radius: 50%; background: #fff;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: -40px;
        }
        .artist-page-header .artist-avatar {
            width: 72px; height: 72px; border-radius: 50%; background: #e9ecef;
            display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: var(--text-sub);
        }
        .artist-page-header .artist-name { font-weight: 800; font-size: 20px; color: var(--text-main); margin-bottom: -36px; }

        /* 글쓰기 카드 */
        .post-write-card { background: var(--white); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .post-write-card textarea { width: 100%; border: none; outline: none; resize: none; font-size: 16px; min-height: 80px; }
        .post-write-card textarea::placeholder,
        .comment-input-wrap textarea::placeholder {
            font-family: 'Pretendard', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .write-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f8f9fa; padding-top: 15px; }
        .btn-submit-post { background: #eee; color: #999; border: none; padding: 10px 24px; border-radius: 25px; font-weight: 700; cursor: pointer; }
        .btn-submit-post.active { background: var(--primary); color: white; }

        /* 게시글 카드 */
        .post-card { background: var(--white); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 26px; padding: 25px; position: relative; }
        .post-card.celebrity-post { border: 2.5px solid var(--primary); }
        .celeb-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 7px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
        .post-body { font-size: 16px; line-height: 1.6; margin-bottom: 20px; }

        /* 댓글 스타일 */
        .comment-item { display: flex; margin-top: 15px; align-items: flex-start; }
        .comment-content { margin-left: 10px; background: #f8f9fa; padding: 10px 14px; border-radius: 12px; flex: 1; }
        .comment-user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .ai-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; color: white; font-weight: 600; }
        .comment-attached-img { width: 100%; max-width: 200px; border-radius: 8px; margin-top: 10px; display: block; border: 1px solid #ddd; cursor: zoom-in; }

        /* 댓글 입력 및 이미지 미리보기 */
        .image-preview-container { display: none; position: relative; width: fit-content; margin-bottom: 10px; }
        .image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .preview-remove { position: absolute; top: -5px; right: -5px; background: #333; color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .comment-input-wrap { background: #f1f3f5; border-radius: 12px; padding: 15px; margin-top: 20px; transition: transform 0.2s; }
        .comment-input-wrap textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; font-size: 14px; min-height: 40px; }
        .comment-btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .btn-comment-submit { background: none; border: none; color: #adb5bd; font-weight: 700; cursor: pointer; }
        .btn-comment-submit.active { color: var(--primary); }

        /* 우측 사이드바 위젯 */
        .right-sidebar { width: 280px; position: sticky; top: 80px; align-self: flex-start; }
        .widget { background: var(--white); border-radius: 15px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        .widget-title { font-weight: 700; font-size: 15px; margin-bottom: 15px; color: #333; display: flex; align-items: center; }
        .widget-title i { margin-right: 8px; font-size: 16px; color: var(--primary); }
        
        /* 1. 실시간 데모 위젯 스타일 */
        .demo-box {
            background: #eafffe; border: 1.5px solid #12d3cf; border-radius: 15px;
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.2s; margin-top: 5px;
        }
        .demo-box:hover { background: #d7fbf9; transform: translateY(-2px); }
        .demo-content strong { display: block; font-size: 15px; color: #333; margin-bottom: 4px; }
        .demo-content span { font-size: 12px; color: #888; }
        .demo-arrow { color: #12d3cf; font-size: 18px; }

        /* 2. AI 분석 통계 그리드 스타일 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #f8f9fa; border-radius: 12px; padding: 20px 5px; text-align: center; }
        .stat-num { font-size: 22px; font-weight: 800; display: block; margin-bottom: 6px; }
        .stat-label { font-size: 12px; color: #888; }

        /* 3. 커뮤니티 안내 리스트 스타일 */
        .info-list { list-style: none; padding: 0; margin: 5px 0 0 0; }
        .info-list li { 
            font-size: 13.5px; color: #555; margin-bottom: 14px; position: relative; 
            padding-left: 18px; line-height: 1.5;
        }
        .info-list li::before {
            content: "•"; color: var(--primary); font-weight: bold; position: absolute; left: 0; font-size: 18px; top: -2px;
        }

        /* 모달 및 넛지 팝업 */
        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 5px; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
        
        .nudge-popup { display: none; position: fixed; z-index: 10001; left: 50%; top: 50%; transform: translate(-50%, -50%); padding: 18px 24px; background: #dc3545; color: #fff; border-radius: 14px; font-weight: 700; box-shadow: 0 8px 24px rgba(220, 53, 69, 0.45); }
        .nudge-popup.show { display: flex; flex-direction: column; align-items: center; }
        .nudge-popup.offensive { background: #fff; color: #333; padding: 28px 32px; border: none; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .nudge-popup.offensive .nudge-popup-text { color: #333; font-weight: 700; line-height: 1.5; }
        .nudge-popup-buttons { display: flex; gap: 12px; margin-top: 20px; width: 100%; justify-content: center; }
        .nudge-popup-buttons button { padding: 10px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; border: none; }
        .nudge-popup-buttons .nudge-btn-edit { background: var(--offensive); color: #fff; }
        .nudge-popup-buttons .nudge-btn-confirm { background: #f1f3f5; color: #333; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); } 20%, 40%, 60%, 80% { transform: translateX(6px); } }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="header-logo"><i class="fa-solid fa-feather-pointed"></i> <span>댓글 <b>넛지</b></span></a>
        <div class="search-bar"><i class="fa-solid fa-magnifying-glass" style="color:#adb5bd"></i><input type="text" placeholder="검색"></div>
        <div class="header-icons">
            <i class="fa-solid fa-flask"></i>
            <a href="/admin" class="header-icon-link" title="관리자 모니터링"><i class="fa-solid fa-shield-halved"></i></a>
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-user"></i>
        </div>
    </header>

    <div class="wrapper">
        <div class="left-sidebar">
            <div class="nav-icon active">NJ</div>
            <div class="nav-icon">LS</div>
            <div class="nav-icon">BT</div>
            <div class="nav-icon">SV</div>
        </div>

        <div class="main-container">
            <div class="main-content-wrap">
                <header class="artist-page-header">
                    <div class="artist-avatar-wrap"><div class="artist-avatar">NJ</div></div>
                    <div class="artist-name">NewJeans</div>
                </header>

                <div class="main-inner">
                    <div class="content-area">
                        <div class="post-write-card">
                            <div class="write-header" style="display:flex; align-items:center; margin-bottom:15px;">
                                <div class="nav-icon" style="width:35px; height:35px; margin:0; background:var(--primary); color:white;">ME</div>
                                <span class="user-label" style="margin-left: 10px; font-weight: 700;">나의 소식 남기기</span>
                            </div>
                            <textarea id="mainPostInput" placeholder="오늘 어떤 일이 있었나요?" oninput="checkPostLength()"></textarea>
                            <div class="write-footer">
                                <div class="write-tools"><i class="fa-regular fa-image"></i> <i class="fa-regular fa-face-smile"></i></div>
                                <button id="mainPostBtn" class="btn-submit-post" onclick="submitNewPost()">게시하기</button>
                            </div>
                        </div>
                        <div id="feedContent"></div>
                    </div>

                    <div class="right-sidebar">
                        <div class="widget">
                            <div class="widget-title"><i class="fa-solid fa-circle-play"></i> 실시간 데모</div>
                            <div class="demo-box" onclick="location.href='/demo'">
                                <div class="demo-content">
                                    <strong>실시간 데모 보기</strong>
                                    <span>AI 댓글 분석을 바로 체험해보세요</span>
                                </div>
                                <i class="fa-solid fa-arrow-right demo-arrow"></i>
                            </div>
                        </div>

                        <div class="widget">
                            <div class="widget-title"><i class="fa-solid fa-chart-simple"></i> AI 분석 통계</div>
                            <div class="stat-grid">
                                <div class="stat-box">
                                    <span class="stat-num" id="totalPosts" style="color:var(--primary)">0</span>
                                    <span class="stat-label">게시글</span>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-num" id="statWarning" style="color:var(--offensive)">0</span>
                                    <span class="stat-label">주의</span>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-num" id="statDanger" style="color:#ff5a5a">0</span>
                                    <span class="stat-label">위험</span>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-num" id="statSafe" style="color:#28a745">0</span>
                                    <span class="stat-label">안전</span>
                                </div>
                            </div>
                        </div>

                        <div class="widget">
                            <div class="widget-title"><i class="fa-solid fa-circle-info"></i> 커뮤니티 안내</div>
                            <ul class="info-list">
                                <li>따뜻하고 존중하는 댓글을 남겨주세요.</li>
                                <li>AI가 댓글을 분석해 유해·위험 표현을 감지합니다.</li>
                                <li>넛지를 통해 더 나은 소동 문화를 만들어가요.</li>
                                <li>궁금한 점은 관리자에게 문의해 주세요.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="nudgePopup" class="nudge-popup">🚫 부적절한 내용이 감지되어 게시가 차단되었습니다.</div>
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        // --- 개인정보 수집 동의 로직 수정 ---
        window.addEventListener('DOMContentLoaded', async () => {
            const userId = 8;
            
            try {
                const checkRes = await fetch(`/users/${userId}`);
                const userData = await checkRes.json();
                
                console.log("현재 유저 동의 상태:", userData.is_agreed);

                if (userData.is_agreed !== true) { 
                    const userAgreed = confirm("⚠️ [개인정보 수집 및 AI 서비스 이용 동의]\n서비스 품질 개선 및 분석을 위해 데이터 수집에 동의하시겠습니까?");

                    if (userAgreed) {
                        await fetch(`/users/${userId}/agreement`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ is_agreed: true })
                        });
                        console.log("동의 완료");
                    }
                } else {
                    console.log("이미 동의된 사용자입니다. Alert을 생략합니다.");
                }
            } catch (error) {
                console.error("데이터 조회 오류:", error);
            }
        });
        // --------------------------------

        window.addEventListener('DOMContentLoaded', loadFeed);

        async function loadFeed() {
            try {
                const response = await fetch("/posts");
                if (response.ok) {
                    let posts = await response.json();
                    
                    posts.sort((a, b) => {
                        if (a.role === 'celebrity' && b.role !== 'celebrity') return -1;
                        if (a.role !== 'celebrity' && b.role === 'celebrity') return 1;
                        return 0;
                    });

                    const feed = document.getElementById('feedContent');
                    feed.innerHTML = ''; 

                    let safeCount = 0, warningCount = 0, dangerCount = 0;

                    posts.forEach(post => {
                        renderPostToFeed(post);
                        if (post.comments) {
                            post.comments.forEach(c => {
                                const label = (c.label || 'none').toLowerCase();
                                if (label === 'none' || label === 'safe' || label.includes('clean')) safeCount++;
                                else if (label === 'hate') dangerCount++;
                                else warningCount++;
                            });
                        }
                    });

                    document.getElementById('totalPosts').innerText = posts.length;
                    document.getElementById('statSafe').innerText = safeCount;
                    document.getElementById('statWarning').innerText = warningCount;
                    document.getElementById('statDanger').innerText = dangerCount;
                }
            } catch (error) { console.error("피드 로드 실패:", error); }
        }

        function renderPostToFeed(post) {
            const feed = document.getElementById('feedContent');
            const postId = post.id;
            const userName = post.username || "익명";
            const isCeleb = post.role === 'celebrity'; 
            
            const postHtml = `
                <div class="post-card ${isCeleb ? 'celebrity-post' : ''}" id="post-${postId}">
                    <div style="display:flex; align-items:center; margin-bottom:15px;">
                        <div class="nav-icon" style="margin:0; width:40px; height:40px; background:${isCeleb ? 'var(--primary)' : '#ddd'}; color:white; border-radius:50%;">${userName.substring(0,1).toUpperCase()}</div>
                        <div style="margin-left:12px;">
                            <div style="font-weight:700;">
                                ${userName} 
                                ${isCeleb ? '<span class="celeb-badge">Artist</span>' : ''}
                            </div>
                            <div style="color:#888; font-size:12px;">방금 전</div>
                        </div>
                    </div>
                    <div class="post-body">${post.body}</div> 
                    <div class="post-actions" style="color:#888; font-size:14px; padding-bottom:15px; border-bottom:1px solid #f8f9fa;">
                        <i class="fa-regular fa-comment"></i> ${post.comments ? post.comments.length : 0}
                    </div>
                    
                    <div class="comment-list">
                        ${post.comments ? post.comments.map(c => {
                            const label = (c.label || 'none').toLowerCase();
                            let badgeColor = 'var(--safe)';
                            if (label === 'hate' || label.includes('unsafe_image')) {
                                badgeColor = 'var(--danger)';
                            } else if (label === 'offensive') {
                                badgeColor = 'var(--offensive)';
                            }
                            return `
                                    <div class="comment-item">
                                        <div class="nav-icon" ...>${(c.username || '익').substring(0,1)}</div>
                                        <div class="comment-content" style="position: relative; overflow: visible;">
                                            <img src="/static/siren.png" style="position: absolute; top: -10px; right: -10px; width: 24px; height: auto; z-index: 10;">
                                            
                                            <div class="comment-user-row" style="display: flex; justify-content: space-between; align-items: center;">
                                                <span class="comment-user">${c.username || '익명'}</span>
                                                
                                                <span class="ai-badge" style="
                                                    background: ${badgeColor}; 
                                                    display: inline-flex; 
                                                    align-items: center; 
                                                    justify-content: center; 
                                                    height: 18px;
                                                    padding: 0 10px; 
                                                    border-radius: 12px;
                                                    color: white;
                                                    font-size: 11px;
                                                    font-weight: bold;
                                                    line-height: 1;
                                                ">
                                                    <span style="display: inline-block; transform: translateY(0.5px);">${c.label}</span>
                                                </span>
                                            </div>
                                            
                                            <div class="comment-text" style="margin-top: 5px;">${c.content}</div>
                                            ${c.image_url ? `<img src="${c.image_url}" class="comment-attached-img" onclick="openModal('${c.image_url}')">` : ''}
                                        </div>
                                    </div>`;
                        }).join('') : ''}
                    </div>

                    <div class="comment-input-wrap">
                        <div id="preview-cont-${postId}" class="image-preview-container">
                            <img id="preview-img-${postId}" class="image-preview">
                            <div class="preview-remove" onclick="removePreview(${postId})">&times;</div>
                        </div>
                        <textarea id="comment-input-${postId}" placeholder="따뜻한 댓글을 남겨주세요..." oninput="checkCommentLength(${postId})"></textarea>
                        <input type="file" id="comment-file-${postId}" style="display:none;" accept="image/*" onchange="updateImageIcon(${postId})">
                        <div class="comment-btn-row">
                            <i class="fa-regular fa-image" id="comment-icon-${postId}" style="color:#888; cursor:pointer; font-size:18px;" onclick="document.getElementById('comment-file-${postId}').click()"></i>
                            <button id="comment-btn-${postId}" class="btn-comment-submit" onclick="submitComment(${postId})">등록</button>
                        </div>
                    </div>
                </div>`;
            feed.insertAdjacentHTML('beforeend', postHtml);
        }

        async function submitComment(postId) {
            const textInput = document.getElementById(`comment-input-${postId}`);
            const fileInput = document.getElementById(`comment-file-${postId}`);
            if (!textInput.value.trim() && (!fileInput.files || !fileInput.files[0])) return;

            const btn = document.getElementById(`comment-btn-${postId}`);
            const wrap = document.querySelector(`#post-${postId} .comment-input-wrap`);
            const popup = document.getElementById('nudgePopup');
            
            btn.disabled = true;

            const formData = new FormData();
            formData.append('content', textInput.value.trim());
            formData.append('post_id', postId);
            if (fileInput.files[0]) formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch("/comments", { method: "POST", body: formData });
                const result = await response.json().catch(() => ({}));
                const finalLabel = (result.ai_result?.final?.label || 'none').toLowerCase();

                if (!response.ok && result.status === 'blocked') {
                    const isImageHate = (result.ai_result?.detail?.image || '').toLowerCase() === 'hate';
                    let mainMsg = isImageHate
                        ? "🚫 부적절한 이미지가 감지되어 게시가 차단되었습니다."
                        : "🚫 부적절한 언어가 감지되어 게시가 차단되었습니다. 내용을 수정해주세요.";

                    popup.innerHTML = `
                        ${mainMsg}<br>
                        <div style="margin-top: 10px; opacity: 0.8; font-size: 0.8em;">
                            <small>AI 판정 결과입니다. 오류가 있을 수 있습니다.</small>
                        </div>
                    `;

                    popup.classList.remove('offensive');
                    popup.style.backgroundColor = "#ff5a5a";
                    popup.style.color = "white"; 
                    popup.classList.add('show');

                    if (wrap) wrap.classList.add('shake');

                    setTimeout(() => {
                        popup.classList.remove('show');
                        if (wrap) wrap.classList.remove('shake');
                    }, 3000);

                    btn.disabled = false;
                    return;
                }

                if (response.ok) {
                    if (finalLabel === 'offensive') {
                        const msg = `
                                    ⚠️ 잠시만요! 작성하신 내용에 상대방이 불쾌감을 느낄 수 있는 표현이 포함되어 있습니다.<br><br>
                                    <div style="text-align: center;">
                                        <strong>※ 경고를 확인했지만 게시하면 관리자에게 기록됩니다.</strong>
                                    </div>
                                    <div style="text-align: center; margin-top: 15px; opacity: 0.6; font-size: 0.75em;">
                                        <small>AI 판정 결과입니다. 기술적 한계로 인해 오류가 있을 수 있습니다.</small>
                                    </div>
                                `;
                        popup.innerHTML =
                            '<span class="nudge-popup-text">' + msg + '</span>' +
                            '<div class="nudge-popup-buttons">' +
                            '<button type="button" class="nudge-btn-confirm">확인</button>' +
                            '<button type="button" class="nudge-btn-edit">수정</button>' +
                            '</div>';
                        popup.classList.add('offensive');
                        popup.classList.add('show');
                        if (wrap) wrap.classList.add('shake');

                        const hideOffensivePopup = () => {
                            popup.classList.remove('show', 'offensive');
                            if (wrap) wrap.classList.remove('shake');
                        };

                        popup.querySelector('.nudge-btn-edit').onclick = async () => {
                            hideOffensivePopup();
                            await fetch(`/comments/${result.id}`, { method: 'DELETE' });
                            textInput.value = '';
                            if (fileInput) fileInput.value = '';
                            removePreview(postId);
                            await loadFeed();
                            const inputEl = document.getElementById(`comment-input-${postId}`);
                            if (inputEl) inputEl.focus();
                            btn.disabled = false;
                        };
                        popup.querySelector('.nudge-btn-confirm').onclick = async () => {
                            hideOffensivePopup();
                            textInput.value = '';
                            if (fileInput) fileInput.value = '';
                            removePreview(postId);
                            await loadFeed();
                            btn.disabled = false;
                        };
                        return;
                    }

                    textInput.value = '';
                    if (fileInput) fileInput.value = '';
                    removePreview(postId);
                    loadFeed(); 
                }
            } catch (err) { 
                console.error("댓글 등록 오류:", err); 
            } finally { 
                btn.disabled = false; 
            }
        }

        function updateImageIcon(postId) {
            const fileInput = document.getElementById(`comment-file-${postId}`);
            const previewCont = document.getElementById(`preview-cont-${postId}`);
            const previewImg = document.getElementById(`preview-img-${postId}`);

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewCont.style.display = 'block';
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                previewCont.style.display = 'none';
            }
            updateCommentActiveState(postId);
        }

        function removePreview(postId) {
            document.getElementById(`comment-file-${postId}`).value = "";
            updateImageIcon(postId);
        }

        function openModal(src) {
            const modal = document.getElementById('imageModal');
            document.getElementById('modalImage').src = src;
            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        async function submitNewPost() {
            const input = document.getElementById('mainPostInput');
            if (!input.value.trim()) return;
            const formData = new FormData();
            formData.append('content', input.value.trim());
            const response = await fetch("/posts", { method: "POST", body: formData });
            if (response.ok) { input.value = ''; loadFeed(); }
        }

        function checkPostLength() {
            const input = document.getElementById('mainPostInput');
            document.getElementById('mainPostBtn').classList.toggle('active', input.value.trim().length > 0);
        }

        function checkCommentLength(id) {
            updateCommentActiveState(id);
        }

        function updateCommentActiveState(id) {
            const input = document.getElementById(`comment-input-${id}`);
            const fileInput = document.getElementById(`comment-file-${id}`);
            const hasText = input && input.value.trim().length > 0;
            const hasImage = fileInput && fileInput.files && fileInput.files[0];
            document.getElementById(`comment-btn-${id}`).classList.toggle('active', hasText || hasImage);
        }
    </script>
</body>
</html>
